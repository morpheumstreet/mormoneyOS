# mormoneyOS + MiroFish — swarm intelligence / foresight layer
# Usage: docker compose -f docker-compose.mirofish.yml up
#
# MiroFish provides: run simulations, get ReportAgent output, inject variables,
# chat with digital crowd. The agent uses the mirofish tool to rehearse
# markets before betting.

services:
  mormoneyos:
    image: sorajez/mormoneyos:latest
    depends_on:
      - mirofish
    environment:
      - MIROFISH_BASE_URL=http://mirofish:5001
    volumes:
      - /home/your_username/clawlaundry/moneyman1:/data
    ports:
      - "20010:8080"

  mirofish:
    # Uncomment one:
    # build: ../MiroFish
    image: ghcr.io/666ghj/mirofish:latest
    container_name: mirofish
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "20011:5001"

    volumes:
      - /path/to/morpheum_konwledges:/app/backend/uploads
